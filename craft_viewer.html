<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spacecraft SVG Explorer</title>
    <style>
        body {
            margin: 0;
            background-color: #0d001a;
            color: #cc00ff;
            font-family: 'Press Start 2P', cursive;
            text-shadow: 0 0 5px #00e0ff, 0 0 10px #cc00ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            text-align: center;
            color: #ff0077;
            text-shadow: 0 0 10px rgba(255, 0, 119, 0.8), 0 0 20px rgba(0, 224, 255, 0.5);
        }

        .subtitle {
            font-size: 0.7rem;
            margin-bottom: 30px;
            color: #00e0ff;
            text-shadow: 0 0 5px rgba(0, 224, 255, 0.5);
            text-align: center;
        }

        /* Tiedostonvalitsin ja raahausalue */
        .upload-container {
            width: 100%;
            max-width: 600px;
            background-color: #04000c;
            border: 2px dashed #ff0077;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            box-sizing: border-box;
            box-shadow: 0 0 20px rgba(255, 0, 119, 0.3);
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease;
            margin-bottom: 40px;
        }

        .upload-container.dragover {
            border-color: #00e0ff;
            box-shadow: 0 0 20px rgba(0, 224, 255, 0.5);
            transform: scale(1.02);
        }

        .upload-text {
            font-size: 0.8rem;
            line-height: 1.6;
            color: #ffffff;
            text-shadow: none;
            pointer-events: none;
        }

        .upload-text span {
            color: #00e0ff;
        }

        #file-input {
            display: none;
        }

        /* Alusruudukko */
        .ships-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            justify-content: center;
        }

        .ship-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            background-color: #04000c;
            border: 2px solid #3d0066;
            border-radius: 8px;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 0 20px rgba(100, 0, 150, 0.3);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .ship-card:hover {
            transform: translateY(-5px);
            border-color: #00e0ff;
            box-shadow: 0 0 30px rgba(0, 224, 255, 0.5);
        }

        .ship-name {
            font-size: 0.8rem;
            color: #ff0077;
            text-align: center;
            margin-bottom: 5px;
            word-break: break-word;
        }

        .ship-preview {
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #020006;
            border-radius: 6px;
            border: 1px solid #1a0033;
            padding: 10px;
            box-sizing: border-box;
        }

        .ship-preview svg {
            width: 100%;
            height: 100%;
        }

        .no-data {
            font-size: 0.8rem;
            color: #666;
            text-shadow: none;
            grid-column: 1 / -1;
            text-align: center;
            margin-top: 20px;
        }

        /* Koristeelliset viivat */
        polygon, circle, ellipse, path, rect {
            stroke: rgba(0, 0, 0, 0.4);
            stroke-width: 1.5;
        }
    </style>
</head>
<body>

    <h1>Spacecraft SVG Explorer</h1>
    <div class="subtitle">Lataa enemies.js-tiedosto nähdäksesi sen sisältämät alukset</div>

    <!-- Raahattava latausalue -->
    <div class="upload-container" id="drop-zone">
        <div class="upload-text">
            Raahaa ja pudota Javascript-tiedosto tähän<br>
            tai <span>klikkaa valitaksesi tiedoston</span>
        </div>
        <input type="file" id="file-input" accept=".js">
    </div>

    <!-- Ruudukko aluksille -->
    <div class="ships-grid" id="ships-grid">
        <div class="no-data">Ei ladattua tiedostoa. Valitse enemiesX.js nähdäksesi alukset.</div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const shipsGrid = document.getElementById('ships-grid');

        // Klikkaus avaa tiedostonvalitsimen
        dropZone.addEventListener('click', () => fileInput.click());

        // Raahaustapahtumat visualisointia varten
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        // Tiedoston lukeminen ja parsiminen
        function handleFile(file) {
            if (!file.name.endsWith('.js')) {
                alert('Valitse voimassa oleva .js-tiedosto (esim. enemies5.js).');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const content = e.target.result;
                parseAndDisplayShips(content);
            };
            reader.readAsText(file);
        }

        // Muuttaa muuttujan nimen (esim. VIPER_HELIX_SVG) luettavaksi nimeksi ("Viper Helix")
        function formatName(varName) {
            return varName
                .replace(/_SVG$/i, '')          // Poistetaan loppuosa
                .split('_')                     // Jaetaan sanoiksi alaviivojen kohdalta
                .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()) // Alkukirjain isoksi
                .join(' ');
        }

        // Etsii SVG-muuttujat tiedostosta säännöllisellä lausekkeella (Regex)
        function parseAndDisplayShips(jsText) {
            shipsGrid.innerHTML = ''; // Tyhjennetään ruudukko

            // Etsii muotoa: const NIMI_SVG = `...` tai `...`;
            const regex = /const\s+([A-Za-z0-9_]+_SVG)\s*=\s*`([\s\S]*?)`/g;
            let match;
            let foundCount = 0;

            while ((match = regex.exec(jsText)) !== null) {
                const varName = match[1];
                const svgContent = match[2].trim();
                const cleanName = formatName(varName);

                createShipCard(cleanName, svgContent);
                foundCount++;
            }

            if (foundCount === 0) {
                shipsGrid.innerHTML = '<div class="no-data">Tiedostosta ei löytynyt tunnistettavia _SVG-päätteisiä vakioita. Varmista, että tiedosto noudattaa oikeaa syntaksia.</div>';
            }
        }

        // Luo kortin alukselle ruudukkoon
        function createShipCard(name, svgHtml) {
            const card = document.createElement('div');
            card.classList.add('ship-card');

            const title = document.createElement('div');
            title.classList.add('ship-name');
            title.textContent = name;

            const preview = document.createElement('div');
            preview.classList.add('ship-preview');
            preview.innerHTML = svgHtml;

            card.appendChild(title);
            card.appendChild(preview);
            shipsGrid.appendChild(card);
        }
    </script>
</body>
</html>
